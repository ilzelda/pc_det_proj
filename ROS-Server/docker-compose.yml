services:
  ros-master:
    image: ros:noetic-ros-base-focal
    container_name: ros-master
    network_mode: host
    environment:
      ROS_MASTER_URI: http://${ROS_HOST_IP:-192.168.0.190}:11311
      ROS_IP: ${ROS_HOST_IP:-192.168.0.190}
    command: bash -lc "source /opt/ros/noetic/setup.bash && roscore"
    restart: unless-stopped

  rosbag-play:
    image: ros:noetic-ros-base-focal
    container_name: rosbag-play
    network_mode: host
    depends_on:
      - ros-master
    environment:
      ROS_MASTER_URI: http://${ROS_HOST_IP:-192.168.0.190}:11311
      ROS_IP: ${ROS_HOST_IP:-192.168.0.190}
    volumes:
      - /mnt:/mnt:ro
    command: >
      bash -lc "
        source /opt/ros/noetic/setup.bash &&
        until rostopic list >/dev/null 2>&1; do
          echo 'waiting for roscore...';
          sleep 1;
        done &&
        rosbag play -l /mnt/NAS2/pjt_AI/00-git-archive/lidar-pytorch/data/seoulsi_yeoui/training/velodyne/lidar_sync.bag
      "
    restart: unless-stopped

  pointpillar-ros:
    build:
      context: ..
      dockerfile: CUDA-PointPillars/docker/Dockerfile.ros-arm64
    image: pointpillar-ros-arm64:latest
    container_name: pointpillar-ros
    network_mode: host
    ipc: host
    runtime: nvidia
    depends_on:
      - ros-master
    environment:
      ROS_MASTER_URI: http://${ROS_HOST_IP:-192.168.0.190}:11311
      ROS_IP: ${ROS_HOST_IP:-192.168.0.190}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LIDAR_TOPIC: ${LIDAR_TOPIC:-/lidar_sync}
      POINTPILLAR_BOXES_TOPIC: ${POINTPILLAR_BOXES_TOPIC:-/pointpillar/boxes}
      POINTPILLAR_ENGINE: ${POINTPILLAR_ENGINE:-/workspace/CUDA-PointPillars/model/pointpillar.plan}
      POINTPILLAR_TIMER: ${POINTPILLAR_TIMER:-false}
      POINTPILLAR_MIN_Z: ${POINTPILLAR_MIN_Z:--3.0}
      POINTPILLAR_MAX_Z: ${POINTPILLAR_MAX_Z:-1.0}
      POINTPILLAR_Z_OFFSET: ${POINTPILLAR_Z_OFFSET:-0.0}
      POINTPILLAR_MAX_NMS_BOXES: ${POINTPILLAR_MAX_NMS_BOXES:-4096}
    volumes:
      - ../CUDA-PointPillars:/workspace/CUDA-PointPillars:rw
    working_dir: /workspace/CUDA-PointPillars
    command: >
      bash -lc "
        source /opt/ros/noetic/setup.bash &&
        until rostopic list >/dev/null 2>&1; do
          echo 'waiting for roscore...';
          sleep 1;
        done &&
        source tool/environment.sh &&
        echo '--- source check: lidar-postprocess.cu:467-482 ---' &&
        nl -ba src/pointpillar/lidar-postprocess.cu | sed -n '467,482p' &&
        echo '--- removing stale build_ros_container ---' &&
        rm -rf build_ros_container &&
        mkdir -p build_ros_container &&
        cd build_ros_container &&
        cmake .. &&
        cmake --build . -- -j$$(nproc) &&
        export LD_LIBRARY_PATH=$$(pwd):$${LD_LIBRARY_PATH} &&
        echo \"LD_LIBRARY_PATH=$${LD_LIBRARY_PATH}\" &&
        ./pointpillar_ros_node _input_topic:=$${LIDAR_TOPIC} _boxes_topic:=$${POINTPILLAR_BOXES_TOPIC} _engine_path:=$${POINTPILLAR_ENGINE} _timer:=$${POINTPILLAR_TIMER} _min_z:=$${POINTPILLAR_MIN_Z} _max_z:=$${POINTPILLAR_MAX_Z} _z_offset:=$${POINTPILLAR_Z_OFFSET} _max_nms_boxes:=$${POINTPILLAR_MAX_NMS_BOXES}
      "
    restart: unless-stopped
