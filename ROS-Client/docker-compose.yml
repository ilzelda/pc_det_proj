# ROS 1 RViz client for /lidar_sync published through the ROS master at 192.168.0.190.
#
# Typical run:
#   xhost +local:docker
#   cd ROS-Client
#   docker compose up
#
# Optional overrides:
#   ROS_IP=192.168.0.xxx RVIZ_FIXED_FRAME=livox_frame docker compose up
#
# The bag mount is for convenient inspection only; this service subscribes to the live topic.
name: ros-client

services:
  rviz_lidar_sync:
    image: ${ROS_CLIENT_IMAGE:-osrf/ros:noetic-desktop-full}
    container_name: ros-client-rviz-lidar-sync
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-1}
      ROS_MASTER_URI: ${ROS_MASTER_URI:-http://192.168.0.190:11311}
      ROS_IP: ${ROS_IP:-}
      LIDAR_TOPIC: ${LIDAR_TOPIC:-/lidar_sync}
      RVIZ_FIXED_FRAME: ${RVIZ_FIXED_FRAME:-livox_frame}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./rviz:/rviz:ro
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        source /opt/ros/noetic/setup.bash

        if [ -z "$${ROS_IP}" ] && command -v ip >/dev/null 2>&1; then
          ROS_IP="$$(ip route get 192.168.0.190 2>/dev/null | awk '{for (i=1; i<=NF; i++) if ($$i == "src") {print $$(i+1); exit}}' || true)"
          export ROS_IP
        fi

        if [ -z "$${ROS_IP}" ] && command -v hostname >/dev/null 2>&1; then
          ROS_IP="$$(hostname -I 2>/dev/null | tr ' ' '\n' | awk '
            /^192[.]168[.]0[.]/ {print; found=1; exit}
            /^192[.]168[.]/ && fallback == "" {fallback=$$0}
            /^[0-9]+[.]/ && first == "" && $$0 !~ /^127[.]/ && $$0 !~ /^172[.]17[.]/ {first=$$0}
            END {
              if (!found && fallback != "") print fallback
              else if (!found && first != "") print first
            }
          ' || true)"
          export ROS_IP
        fi

        if [ -z "$${ROS_IP}" ]; then
          echo "ROS_IP is empty. Run with ROS_IP=<this-PC-IP> docker compose up." >&2
          exit 1
        fi

        mkdir -p /tmp/rviz
        sed \
          -e "s#__LIDAR_TOPIC__#$${LIDAR_TOPIC}#g" \
          -e "s#__FIXED_FRAME__#$${RVIZ_FIXED_FRAME}#g" \
          /rviz/lidar_sync.rviz.tpl > /tmp/rviz/lidar_sync.rviz

        echo "ROS_MASTER_URI=$${ROS_MASTER_URI}"
        echo "ROS_IP=$${ROS_IP}"
        echo "LIDAR_TOPIC=$${LIDAR_TOPIC}"
        echo "RVIZ_FIXED_FRAME=$${RVIZ_FIXED_FRAME}"
        rviz -d /tmp/rviz/lidar_sync.rviz
